<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseTracker Pro - Smart Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-100px) rotate(180deg); }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 i {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .date {
            color: #666;
            margin-top: 10px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .stat-card:hover::before {
            left: 100%;
        }

        .stat-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .stat-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
            margin-top: 10px;
        }

        .stat-change {
            margin-top: 10px;
            font-size: 14px;
        }

        .positive {
            color: #10b981;
        }

        .negative {
            color: #ef4444;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        /* Form Section */
        .form-section, .charts-section, .history-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: fadeInUp 0.6s ease-out;
        }

        .section-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .add-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        /* Chart Containers */
        .chart-container {
            margin-bottom: 25px;
        }

        canvas {
            max-height: 200px;
        }

        /* History List */
        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .expense-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(50px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .expense-item:hover {
            transform: translateX(5px);
            background: #e9ecef;
        }

        .expense-info {
            flex: 1;
        }

        .expense-category {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .expense-date {
            font-size: 12px;
            color: #888;
        }

        .expense-amount {
            font-size: 18px;
            font-weight: bold;
            margin: 0 15px;
        }

        .expense-amount.income {
            color: #10b981;
        }

        .expense-amount.expense {
            color: #ef4444;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #dc2626;
            transform: scale(1.05);
        }

        /* Filter Buttons */
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .toast.show {
            transform: translateX(0);
        }

        /* Responsive */
        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="circle" style="width: 300px; height: 300px; top: -100px; right: -100px; animation-duration: 25s;"></div>
        <div class="circle" style="width: 200px; height: 200px; bottom: -50px; left: -50px; animation-duration: 20s;"></div>
        <div class="circle" style="width: 150px; height: 150px; top: 50%; left: 50%; animation-duration: 30s;"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <i class="fas fa-chart-line"></i>
                ExpenseTracker Pro
            </h1>
            <div class="date" id="currentDate"></div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-wallet" style="color: #667eea;"></i>
                </div>
                <div class="stat-label">Total Balance</div>
                <div class="stat-value" id="totalBalance">₹0</div>
                <div class="stat-change" id="balanceChange">+0% from last month</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-arrow-up" style="color: #10b981;"></i>
                </div>
                <div class="stat-label">Total Income</div>
                <div class="stat-value" id="totalIncome">₹0</div>
                <div class="stat-change positive" id="incomeChange">↑ 0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-arrow-down" style="color: #ef4444;"></i>
                </div>
                <div class="stat-label">Total Expenses</div>
                <div class="stat-value" id="totalExpense">₹0</div>
                <div class="stat-change negative" id="expenseChange">↓ 0%</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-grid">
            <!-- Add Transaction Form -->
            <div class="form-section">
                <div class="section-title">
                    <i class="fas fa-plus-circle"></i>
                    Add Transaction
                </div>
                <form id="transactionForm">
                    <div class="input-group">
                        <label>Description</label>
                        <input type="text" id="description" placeholder="e.g., Salary, Groceries, Rent..." required>
                    </div>
                    <div class="input-group">
                        <label>Amount (₹)</label>
                        <input type="number" id="amount" placeholder="Enter amount" step="0.01" required>
                    </div>
                    <div class="input-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="food">🍔 Food & Dining</option>
                            <option value="transport">🚗 Transport</option>
                            <option value="shopping">🛍️ Shopping</option>
                            <option value="entertainment">🎬 Entertainment</option>
                            <option value="bills">💡 Bills & Utilities</option>
                            <option value="health">🏥 Health</option>
                            <option value="education">📚 Education</option>
                            <option value="other">📦 Other</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Type</label>
                        <select id="type" required>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <button type="submit" class="add-btn">
                        <i class="fas fa-plus"></i> Add Transaction
                    </button>
                </form>
            </div>

            <!-- Charts Section -->
            <div class="charts-section">
                <div class="section-title">
                    <i class="fas fa-chart-pie"></i>
                    Analytics
                </div>
                <div class="chart-container">
                    <canvas id="expenseChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Transaction History -->
        <div class="history-section">
            <div class="section-title">
                <i class="fas fa-history"></i>
                Transaction History
                <span style="margin-left: auto; font-size: 14px; color: #666;" id="transactionCount">0 transactions</span>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="income">Income</button>
                <button class="filter-btn" data-filter="expense">Expenses</button>
            </div>
            <div class="history-list" id="historyList">
                <div style="text-align: center; color: #999; padding: 40px;">
                    <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 10px; display: block;"></i>
                    No transactions yet. Add your first transaction!
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i> Transaction added successfully!
    </div>

    <script>
        // Initialize data
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let currentFilter = 'all';
        let expenseChart, trendChart;

        // Set current date
        document.getElementById('currentDate').innerHTML = new Date().toLocaleDateString('en-US', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });
        
        // Set default date to today
        document.getElementById('date').valueAsDate = new Date();

        // Show toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Add transaction
        document.getElementById('transactionForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const description = document.getElementById('description').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const type = document.getElementById('type').value;
            const date = document.getElementById('date').value;
            
            if (!description || !amount || !category || !type || !date) {
                showToast('Please fill all fields!');
                return;
            }
            
            const transaction = {
                id: Date.now(),
                description,
                amount,
                category,
                type,
                date,
                categoryName: document.getElementById('category').options[document.getElementById('category').selectedIndex].text
            };
            
            transactions.unshift(transaction);
            saveToLocalStorage();
            updateUI();
            showToast(`${type === 'income' ? 'Income' : 'Expense'} added successfully!`);
            
            document.getElementById('transactionForm').reset();
            document.getElementById('date').valueAsDate = new Date();
        });
        
        // Delete transaction
        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            saveToLocalStorage();
            updateUI();
            showToast('Transaction deleted!');
        }
        
        // Save to localStorage
        function saveToLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }
        
        // Calculate statistics
        function calculateStats() {
            const totalIncome = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const totalExpense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            const balance = totalIncome - totalExpense;
            
            return { totalIncome, totalExpense, balance };
        }
        
        // Get category data for chart
        function getCategoryData() {
            const expensesByCategory = {};
            transactions.filter(t => t.type === 'expense').forEach(t => {
                const category = t.categoryName;
                expensesByCategory[category] = (expensesByCategory[category] || 0) + t.amount;
            });
            
            return {
                labels: Object.keys(expensesByCategory),
                data: Object.values(expensesByCategory)
            };
        }
        
        // Get monthly trend
        function getMonthlyTrend() {
            const monthlyData = {};
            transactions.forEach(t => {
                const month = t.date.substring(0, 7);
                if (!monthlyData[month]) {
                    monthlyData[month] = { income: 0, expense: 0 };
                }
                if (t.type === 'income') {
                    monthlyData[month].income += t.amount;
                } else {
                    monthlyData[month].expense += t.amount;
                }
            });
            
            const months = Object.keys(monthlyData).sort().slice(-6);
            const incomeData = months.map(m => monthlyData[m].income);
            const expenseData = months.map(m => monthlyData[m].expense);
            
            return { months, incomeData, expenseData };
        }
        
        // Update charts
        function updateCharts() {
            const categoryData = getCategoryData();
            const trendData = getMonthlyTrend();
            
            if (expenseChart) expenseChart.destroy();
            if (trendChart) trendChart.destroy();
            
            const ctx1 = document.getElementById('expenseChart').getContext('2d');
            expenseChart = new Chart(ctx1, {
                type: 'doughnut',
                data: {
                    labels: categoryData.labels,
                    datasets: [{
                        data: categoryData.data,
                        backgroundColor: ['#667eea', '#764ba2', '#f59e0b', '#10b981', '#ef4444', '#8b5cf6', '#ec489a', '#6b7280'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' },
                        title: { display: true, text: 'Expenses by Category' }
                    }
                }
            });
            
            const ctx2 = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: trendData.months,
                    datasets: [
                        {
                            label: 'Income',
                            data: trendData.incomeData,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Expenses',
                            data: trendData.expenseData,
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: { display: true, text: 'Monthly Trend (Last 6 Months)' }
                    }
                }
            });
        }
        
        // Update UI
        function updateUI() {
            const stats = calculateStats();
            const filteredTransactions = currentFilter === 'all' ? transactions : transactions.filter(t => t.type === currentFilter);
            
            document.getElementById('totalBalance').innerHTML = `₹${stats.balance.toFixed(2)}`;
            document.getElementById('totalIncome').innerHTML = `₹${stats.totalIncome.toFixed(2)}`;
            document.getElementById('totalExpense').innerHTML = `₹${stats.totalExpense.toFixed(2)}`;
            document.getElementById('transactionCount').innerHTML = `${filteredTransactions.length} transactions`;
            
            // Calculate percentage changes (mock data for demo)
            const lastMonth = transactions.filter(t => {
                const lastMonthDate = new Date();
                lastMonthDate.setMonth(lastMonthDate.getMonth() - 1);
                return new Date(t.date) >= lastMonthDate;
            });
            const lastMonthIncome = lastMonth.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
            const lastMonthExpense = lastMonth.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
            
            const incomeChange = lastMonthIncome ? ((stats.totalIncome - lastMonthIncome) / lastMonthIncome * 100).toFixed(1) : 0;
            const expenseChange = lastMonthExpense ? ((stats.totalExpense - lastMonthExpense) / lastMonthExpense * 100).toFixed(1) : 0;
            
            document.getElementById('incomeChange').innerHTML = `↑ ${incomeChange}% from last month`;
            document.getElementById('expenseChange').innerHTML = `↓ ${Math.abs(expenseChange)}% from last month`;
            document.getElementById('balanceChange').innerHTML = `${incomeChange - expenseChange > 0 ? '+' : ''}${(incomeChange - expenseChange).toFixed(1)}% from last month`;
            
            // Render history
            const historyList = document.getElementById('historyList');
            if (filteredTransactions.length === 0) {
                historyList.innerHTML = `<div style="text-align: center; color: #999; padding: 40px;">
                    <i class="fas fa-inbox" style="font-size: 48px; margin-bottom: 10px; display: block;"></i>
                    No transactions found.
                </div>`;
            } else {
                historyList.innerHTML = filteredTransactions.map(t => `
                    <div class="expense-item">
                        <div class="expense-info">
                            <div class="expense-category">
                                <i class="fas ${t.type === 'income' ? 'fa-arrow-up' : 'fa-arrow-down'}" style="color: ${t.type === 'income' ? '#10b981' : '#ef4444'}; margin-right: 8px;"></i>
                                ${t.description}
                                <span style="font-size: 12px; color: #888; margin-left: 10px;">${t.categoryName}</span>
                            </div>
                            <div class="expense-date"><i class="far fa-calendar-alt"></i> ${new Date(t.date).toLocaleDateString()}</div>
                        </div>
                        <div class="expense-amount ${t.type === 'income' ? 'income' : 'expense'}">
                            ${t.type === 'income' ? '+' : '-'}₹${t.amount.toFixed(2)}
                        </div>
                        <button class="delete-btn" onclick="deleteTransaction(${t.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `).join('');
            }
            
            updateCharts();
        }
        
        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                updateUI();
            });
        });
        
        // Initial load
        updateUI();
        
        // Auto-save on window close
        window.addEventListener('beforeunload', () => {
            saveToLocalStorage();
        });
    </script>
</body>
</html>
