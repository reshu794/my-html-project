<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Face Scanner Pro | AI Face Detection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,255,255,0.1), transparent);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(100px, 100px) scale(1.5); }
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #00ff88, #00b4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 15px;
        }

        .header p {
            color: rgba(255,255,255,0.7);
            margin-top: 10px;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* Camera Section */
        .camera-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInLeft 0.6s ease-out;
        }

        @keyframes fadeInLeft {
            from {
                transform: translateX(-50px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .video-container {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 4/3;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        /* Scanner Effect */
        .scanner-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff88, #00b4ff, #00ff88, transparent);
            animation: scan 2s linear infinite;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* Controls */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ff88, #00b4ff);
            color: #1a1a2e;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #00b894, #55efc4);
            color: #1a1a2e;
        }

        .btn-warning {
            background: linear-gradient(135deg, #fdcb6e, #ffeaa7);
            color: #1a1a2e;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Info Section */
        .info-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInRight 0.6s ease-out;
        }

        @keyframes fadeInRight {
            from {
                transform: translateX(50px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .face-info {
            text-align: center;
        }

        .face-status {
            font-size: 18px;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .status-detected {
            background: rgba(0,255,136,0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .status-not-detected {
            background: rgba(255,71,87,0.2);
            border: 1px solid #ff4757;
            color: #ff4757;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00ff88;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }

        /* Detection History */
        .history-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .history-title {
            font-size: 20px;
            color: white;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(50px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .history-time {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .history-status {
            color: #00ff88;
            font-weight: bold;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loading-spinner {
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0,255,136,0.3);
            border-top: 3px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00ff88, #00b4ff);
            color: #1a1a2e;
            padding: 15px 25px;
            border-radius: 12px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
            font-weight: bold;
        }

        .toast.show {
            transform: translateX(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 32px;
            }
            
            .btn {
                padding: 10px 18px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="orb" style="top: -200px; right: -200px;"></div>
        <div class="orb" style="bottom: -200px; left: -200px; animation-delay: -5s;"></div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p style="color: white;">Initializing Face Scanner...</p>
            <p style="color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 10px;">Requesting camera access</p>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-face-smile"></i>
                Face Scanner Pro
            </h1>
            <p>AI-Powered Face Detection | Real-time Scanning</p>
        </div>

        <div class="main-grid">
            <!-- Camera Section -->
            <div class="camera-section">
                <div class="video-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                    <div class="scanner-line"></div>
                </div>
                <div class="controls">
                    <button class="btn btn-primary" id="startScanBtn">
                        <i class="fas fa-play"></i> Start Scanner
                    </button>
                    <button class="btn btn-danger" id="stopScanBtn">
                        <i class="fas fa-stop"></i> Stop
                    </button>
                    <button class="btn btn-success" id="captureBtn">
                        <i class="fas fa-camera"></i> Capture
                    </button>
                </div>
            </div>

            <!-- Info Section -->
            <div class="info-section">
                <div class="face-info">
                    <div class="face-status" id="faceStatus">
                        <i class="fas fa-circle-notch fa-spin"></i> Waiting for camera...
                    </div>
                    
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-value" id="faceCount">0</div>
                            <div class="stat-label">Faces Detected</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="scanCount">0</div>
                            <div class="stat-label">Total Scans</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="confidence">0%</div>
                            <div class="stat-label">Confidence</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="fps">0</div>
                            <div class="stat-label">FPS</div>
                        </div>
                    </div>

                    <button class="btn btn-warning" id="downloadReportBtn" style="width: 100%;">
                        <i class="fas fa-download"></i> Download Scan Report
                    </button>
                </div>
            </div>
        </div>

        <!-- History Section -->
        <div class="history-section">
            <div class="history-title">
                <i class="fas fa-history"></i>
                Detection History
                <button class="btn" id="clearHistoryBtn" style="margin-left: auto; padding: 5px 15px; background: rgba(255,71,87,0.2); color: #ff4757;">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>
            <div class="history-list" id="historyList">
                <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">
                    <i class="fas fa-camera" style="font-size: 48px; margin-bottom: 10px; display: block;"></i>
                    No scans yet. Start the scanner!
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i> Face detected!
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // DOM Elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const toast = document.getElementById('toast');
        
        // Stats
        let faceCount = 0;
        let totalScans = 0;
        let currentConfidence = 0;
        let frameCount = 0;
        let lastTime = performance.now();
        let fps = 0;
        
        // History
        let detectionHistory = JSON.parse(localStorage.getItem('faceHistory')) || [];
        
        // Face Detection
        let faceDetection = null;
        let camera = null;
        let isScanning = false;
        
        // Show toast
        function showToast(message, isError = false) {
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${message}`;
            toast.style.background = isError ? 'linear-gradient(135deg, #ff4757, #ff6b81)' : 'linear-gradient(135deg, #00ff88, #00b4ff)';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // Update UI stats
        function updateStats() {
            document.getElementById('faceCount').textContent = faceCount;
            document.getElementById('scanCount').textContent = totalScans;
            document.getElementById('confidence').textContent = `${Math.round(currentConfidence)}%`;
            document.getElementById('fps').textContent = fps;
        }
        
        // Update face status
        function updateFaceStatus(detected) {
            const statusDiv = document.getElementById('faceStatus');
            if (detected) {
                statusDiv.innerHTML = `<i class="fas fa-face-smile"></i> Face Detected! (${faceCount} face${faceCount > 1 ? 's' : ''})`;
                statusDiv.className = 'face-status status-detected';
            } else {
                statusDiv.innerHTML = `<i class="fas fa-face-frown"></i> No Face Detected`;
                statusDiv.className = 'face-status status-not-detected';
            }
        }
        
        // Add to history
        function addToHistory(faceCount, confidence) {
            const historyItem = {
                id: Date.now(),
                timestamp: new Date().toLocaleTimeString(),
                date: new Date().toLocaleDateString(),
                faceCount: faceCount,
                confidence: confidence
            };
            
            detectionHistory.unshift(historyItem);
            if (detectionHistory.length > 20) detectionHistory.pop();
            localStorage.setItem('faceHistory', JSON.stringify(detectionHistory));
            updateHistoryList();
        }
        
        // Update history list
        function updateHistoryList() {
            const historyList = document.getElementById('historyList');
            
            if (detectionHistory.length === 0) {
                historyList.innerHTML = `<div style="text-align: center; color: rgba(255,255,255,0.5); padding: 40px;">
                    <i class="fas fa-camera" style="font-size: 48px; margin-bottom: 10px; display: block;"></i>
                    No scans yet. Start the scanner!
                </div>`;
                return;
            }
            
            historyList.innerHTML = detectionHistory.map(item => `
                <div class="history-item">
                    <div>
                        <div><strong>${item.faceCount} Face${item.faceCount > 1 ? 's' : ''} Detected</strong></div>
                        <div class="history-time">${item.date} at ${item.timestamp}</div>
                    </div>
                    <div class="history-status">${Math.round(item.confidence)}% confidence</div>
                </div>
            `).join('');
        }
        
        // Calculate FPS
        function calculateFPS() {
            frameCount++;
            const now = performance.now();
            const delta = now - lastTime;
            
            if (delta >= 1000) {
                fps = Math.round((frameCount * 1000) / delta);
                frameCount = 0;
                lastTime = now;
                updateStats();
            }
        }
        
        // Process detection results
        function onResults(results) {
            if (!isScanning) return;
            
            // Clear canvas
            ctx.save();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            faceCount = results.detections ? results.detections.length : 0;
            
            if (results.detections && results.detections.length > 0) {
                // Draw bounding boxes
                for (const detection of results.detections) {
                    // Draw bounding box
                    const bbox = detection.boundingBox;
                    const x = bbox.xCenter - bbox.width / 2;
                    const y = bbox.yCenter - bbox.height / 2;
                    
                    ctx.strokeStyle = '#00ff88';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x * canvas.width, y * canvas.height, 
                                 bbox.width * canvas.width, bbox.height * canvas.height);
                    
                    // Draw key points
                    if (detection.landmarks) {
                        for (const landmark of detection.landmarks) {
                            ctx.fillStyle = '#00b4ff';
                            ctx.beginPath();
                            ctx.arc(landmark.x * canvas.width, landmark.y * canvas.height, 4, 0, 360);
                            ctx.fill();
                        }
                    }
                    
                    // Draw confidence
                    currentConfidence = (detection.score?.[0] || 0) * 100;
                    ctx.fillStyle = '#00ff88';
                    ctx.font = 'bold 16px Arial';
                    ctx.shadowBlur = 0;
                    ctx.fillText(`${Math.round(currentConfidence)}%`, 
                                x * canvas.width, y * canvas.height - 10);
                }
                
                updateFaceStatus(true);
                calculateFPS();
                
                // Add to history every 30 frames (roughly every second)
                if (Math.random() < 0.05 && faceCount > 0) {
                    addToHistory(faceCount, currentConfidence);
                    totalScans++;
                    updateStats();
                    if (faceCount > 0 && currentConfidence > 70) {
                        showToast(`✓ ${faceCount} face${faceCount > 1 ? 's' : ''} detected!`);
                    }
                }
            } else {
                updateFaceStatus(false);
                currentConfidence = 0;
                calculateFPS();
            }
            
            ctx.restore();
            updateStats();
        }
        
        // Initialize face detection
        async function initFaceDetection() {
            try {
                faceDetection = new FaceDetection({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`;
                    }
                });
                
                faceDetection.setOptions({
                    model: 'short',
                    minDetectionConfidence: 0.5
                });
                
                faceDetection.onResults(onResults);
                
                // Setup camera
                camera = new Camera(video, {
                    onFrame: async () => {
                        if (isScanning && faceDetection) {
                            await faceDetection.send({image: video});
                        }
                    },
                    width: 640,
                    height: 480
                });
                
                await camera.start();
                
                // Set canvas dimensions
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                
                setTimeout(() => {
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loadingOverlay.style.display = 'none';
                    }, 500);
                }, 1000);
                
                showToast('Camera ready! Click Start Scanner');
                
            } catch (error) {
                console.error('Error:', error);
                loadingOverlay.innerHTML = `
                    <div class="loading-spinner">
                        <i class="fas fa-exclamation-triangle" style="font-size: 50px; color: #ff4757;"></i>
                        <p style="color: white; margin-top: 20px;">Camera access denied or error</p>
                        <p style="color: rgba(255,255,255,0.5); font-size: 12px;">Please allow camera access and refresh</p>
                    </div>
                `;
                showToast('Camera access failed!', true);
            }
        }
        
        // Start scanning
        function startScanning() {
            isScanning = true;
            showToast('Scanner activated! Looking for faces...');
        }
        
        // Stop scanning
        function stopScanning() {
            isScanning = false;
            faceCount = 0;
            updateFaceStatus(false);
            updateStats();
            showToast('Scanner stopped');
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        }
        
        // Capture image
        function captureImage() {
            if (!isScanning) {
                showToast('Please start scanner first!', true);
                return;
            }
            
            const captureCanvas = document.createElement('canvas');
            captureCanvas.width = canvas.width;
            captureCanvas.height = canvas.height;
            const captureCtx = captureCanvas.getContext('2d');
            captureCtx.drawImage(canvas, 0, 0);
            
            const link = document.createElement('a');
            link.download = `face-scan-${Date.now()}.png`;
            link.href = captureCanvas.toDataURL();
            link.click();
            
            showToast('Image captured and saved!');
        }
        
        // Download report
        function downloadReport() {
            const report = {
                generatedAt: new Date().toISOString(),
                totalScans: totalScans,
                currentSession: {
                    facesDetected: faceCount,
                    confidence: currentConfidence,
                    isScanning: isScanning
                },
                history: detectionHistory
            };
            
            const blob = new Blob([JSON.stringify(report, null, 2)], {type: 'application/json'});
            const link = document.createElement('a');
            link.download = `face-scan-report-${Date.now()}.json`;
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
            
            showToast('Report downloaded!');
        }
        
        // Clear history
        function clearHistory() {
            detectionHistory = [];
            localStorage.setItem('faceHistory', JSON.stringify(detectionHistory));
            updateHistoryList();
            totalScans = 0;
            updateStats();
            showToast('History cleared!');
        }
        
        // Event listeners
        document.getElementById('startScanBtn').addEventListener('click', startScanning);
        document.getElementById('stopScanBtn').addEventListener('click', stopScanning);
        document.getElementById('captureBtn').addEventListener('click', captureImage);
        document.getElementById('downloadReportBtn').addEventListener('click', downloadReport);
        document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);
        
        // Initialize
        initFaceDetection();
        updateHistoryList();
        
        // Handle page visibility
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && camera) {
                // Optionally pause when tab is not visible
            }
        });
    </script>
</body>
</html>
